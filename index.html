<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BetSim Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Szybkie poprawki krytyczne dla układu */
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .step { 
            display: none; 
            width: 100%; 
            min-height: 100vh; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
        }
        .step.active { display: flex; }
        #profile-trigger { 
            width: 35px; height: 35px; border-radius: 50%; 
            border: 2px solid #00c853; background-color: #222; cursor: pointer; 
        }
        .tab-content { display: none; padding: 15px; padding-bottom: 90px; }
        .tab-content.active { display: block; }
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: #111; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #333; z-index: 8000;
        }
        .bottom-nav button { 
            background: none; border: none; color: #888; 
            font-size: 0.7rem; font-weight: bold; cursor: pointer; 
        }
        .avatar { width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .budget-options button { 
            width: 80%; max-width: 200px; padding: 15px; margin: 5px; 
            background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; 
        }
    </style>
</head>
<body>

    <audio id="snd-click" src="click.mp3" preload="auto"></audio>
    <audio id="snd-win" src="win.mp3" preload="auto"></audio>
    <audio id="snd-lose" src="lost.mp3" preload="auto"></audio>

    <div id="app-container">
        
        <section id="step-1" class="step active">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">BET<span style="color:#00c853">SIM</span></h1>
            <p>Jak się nazywasz?</p>
            <input type="text" id="username" placeholder="Wpisz imię..." 
                   style="padding: 12px; border-radius: 8px; border: none; width: 250px; text-align: center; margin-bottom: 15px;">
            <button onclick="nextStep(2)" 
                    style="padding: 12px 40px; background: #00c853; border: none; border-radius: 8px; font-weight: 900; cursor: pointer;">DALEJ</button>
        </section>

        <section id="step-2" class="step">
            <h2>Wybierz profil</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0;">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar" onclick="selectAvatar(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar" onclick="selectAvatar(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jack" class="avatar" onclick="selectAvatar(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" class="avatar" onclick="selectAvatar(this)">
            </div>
            <button onclick="nextStep(3)" style="padding: 12px 40px; background: #00c853; border: none; border-radius: 8px; font-weight: 900;">ZATWIERDŹ</button>
        </section>

        <section id="step-3" class="step">
            <h2>Twój budżet startowy:</h2>
            <div class="budget-options">
                <button onclick="setBudget(100)">100 zł</button>
                <button onclick="setBudget(500)">500 zł</button>
                <button onclick="setBudget(2500)">2500 zł</button>
            </div>
        </section>

        <main id="main-app" class="step" style="justify-content: flex-start; text-align: left;">
            <header style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; box-sizing: border-box; background: #111; border-bottom: 1px solid #222;">
                <div style="font-weight: 900; font-size: 1.2rem;">BET<span style="color:#00c853">SIM</span></div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div id="balance-display" style="color: #00c853; font-weight: bold;">0.00 zł</div>
                    <div id="profile-trigger" onclick="showTab('tab-profile')"></div>
                </div>
            </header>

            <div id="tab-matches" class="tab-content active" style="width: 100%; box-sizing: border-box;">
                <h3 style="margin-bottom: 15px; padding-left: 5px;">DZISIEJSZE MECZE</h3>
                <div id="matches-list"></div>
            </div>

            <div id="tab-bets" class="tab-content" style="width: 100%; box-sizing: border-box;">
                <h3 style="margin-bottom: 15px; padding-left: 5px;">TWOJE KUPONY</h3>
                <div id="active-bets-list">
                    </div>
            </div>

            <div id="tab-profile" class="tab-content" style="width: 100%; box-sizing: border-box; text-align: center;">
                <div id="user-info-full" style="background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333;"></div>
                <button onclick="resetData()" style="width: 100%; margin-top: 20px; background: #ff5252; border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold;">WYLOGUJ / RESETUJ</button>
            </div>

            <nav class="bottom-nav">
                <button onclick="showTab('tab-matches')">🏠<br>MECZE</button>
                <button onclick="showTab('tab-bets')">📝<br>KUPONY</button>
                <button onclick="showTab('tab-profile')">👤<br>PROFIL</button>
            </nav>
        </main>
    </div>

    <div id="floating-slip-btn" onclick="toggleSlip(true)" style="display:none; position:fixed; bottom:85px; right:20px; background:#00c853; color:#000; width:55px; height:55px; border-radius:50%; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 5px 15px rgba(0,0,0,0.5); z-index:9000; font-weight:bold; cursor:pointer;">
        <span id="slip-count">0</span>
    </div>

    <div id="slip-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; justify-content:center; align-items:flex-end;">
        <div style="background:#1a1a1a; width:100%; max-width:450px; border-radius:20px 20px 0 0; padding:20px; box-sizing:border-box;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="margin:0;">KUPON AKO</h3>
                <button onclick="toggleSlip(false)" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
            </div>
            <div id="slip-matches-list" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
            <div style="border-top: 1px solid #333; padding-top: 15px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>Kurs:</span> <b id="total-odd-display" style="color:#00c853;">1.00</b>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span>Stawka (zł):</span>
                    <input type="number" id="slip-stake" value="10" style="width:70px; background:#000; border:1px solid #444; color:white; padding:8px; border-radius:5px; text-align:center;">
                </div>
                <button onclick="placeBet()" style="width:100%; background:#00c853; color:#000; border:none; padding:15px; border-radius:12px; font-weight:bold; font-size:1rem;">POSTAW ZAKŁAD</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
